<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Twemoji Viewer</title>
  <style>
    :root {
      --primary: #171717;
      --on-primary: #ffffff;
      --canvas: #ffffff;
      --canvas-soft: #fafafa;
      --hairline: #ebebeb;
      --link: #0070f3;
      --success: #0070f3;
      --mute: #888888;
      --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Inter', sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-family);
      background: var(--canvas);
      color: var(--primary);
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .header p {
      color: var(--mute);
      font-size: 14px;
    }

    /* Control Bar */
    .control-bar {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 12px 16px;
      background: var(--canvas-soft);
      border: 1px solid var(--hairline);
      border-radius: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .search-group {
      display: flex;
      gap: 8px;
      flex: 1;
      min-width: 200px;
    }

    .search-input {
      flex: 1;
      padding: 8px 12px;
      border: none;
      background: transparent;
      font-size: 14px;
      outline: none;
    }

    .search-input::placeholder {
      color: var(--mute);
    }

    .search-btn {
      padding: 8px 16px;
      background: var(--primary);
      color: var(--on-primary);
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .search-btn:hover {
      opacity: 0.9;
    }

    .control-group {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .control-label {
      font-size: 13px;
      color: var(--mute);
    }

    .page-size-select {
      padding: 8px 12px;
      border: 1px solid var(--hairline);
      border-radius: 4px;
      background: var(--canvas);
      font-size: 14px;
      cursor: pointer;
    }

    .case-toggle {
      padding: 8px 12px;
      background: var(--canvas);
      border: 1px solid var(--hairline);
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .case-toggle.active {
      background: var(--primary);
      color: var(--on-primary);
      border-color: var(--primary);
    }

    .category-select {
      padding: 8px 12px;
      border: 1px solid var(--hairline);
      border-radius: 4px;
      background: var(--canvas);
      font-size: 14px;
      cursor: pointer;
      min-width: 150px;
    }

    /* Emoji Grid */
    .emoji-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
      gap: 4px;
      margin-bottom: 24px;
    }

    .emoji-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 60px;
      height: 60px;
      background: var(--canvas);
      border: 1px solid var(--hairline);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s ease-out;
      user-select: none;
    }

    .emoji-card:hover {
      border-color: var(--link);
    }

    .emoji-card.copied {
      transform: scale(1.2);
      border-color: var(--success);
    }

    .emoji-icon {
      width: 36px;
      height: 36px;
      object-fit: contain;
    }

    .emoji-label {
      font-size: 10px;
      color: var(--mute);
      margin-top: 2px;
      text-align: center;
      width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Pagination */
    .pagination {
      display: flex;
      justify-content: center;
      gap: 4px;
      flex-wrap: wrap;
    }

    .page-btn {
      padding: 8px 12px;
      background: transparent;
      border: 1px solid var(--hairline);
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      min-width: 40px;
      text-align: center;
    }

    .page-btn:hover {
      background: var(--canvas-soft);
    }

    .page-btn.active {
      background: var(--primary);
      color: var(--on-primary);
      border-color: var(--primary);
    }

    .page-btn.disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 40px;
      color: var(--mute);
    }

    /* Responsive */
    @media (max-width: 600px) {
      .control-bar {
        flex-direction: column;
      }

      .search-group {
        width: 100%;
      }

      .control-group {
        width: 100%;
        justify-content: space-between;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Twemoji Viewer</h1>
      <p>点击表情复制编号，支持多语种搜索</p>
    </div>

    <div class="control-bar">
      <div class="search-group">
        <input type="text" class="search-input" placeholder="搜索emoji... (如: smile / 微笑)">
        <button class="search-btn" id="searchBtn">搜索</button>
      </div>
      <div class="control-group">
        <span class="control-label">分类:</span>
        <select class="category-select" id="categorySelect">
          <option value="all">📋 全部</option>
          <option value="People & Body">👋 人物与身体</option>
          <option value="Other">❓ 其他</option>
          <option value="Flags">🏁 旗帜</option>
          <option value="Objects">💡 物品</option>
          <option value="Travel & Places">🚗 旅行与地点</option>
          <option value="Smileys & Emotion">😊 表情与情感</option>
          <option value="Symbols">🔣 符号</option>
          <option value="Animals & Nature">🐻 动物与自然</option>
          <option value="Food & Drink">🍎 食物与饮品</option>
          <option value="Activities">⚽ 活动</option>
          <option value="Component">🏷️ 组件</option>
        </select>
      </div>
      <div class="control-group">
        <span class="control-label">每页:</span>
        <select class="page-size-select" id="pageSizeSelect">
          <option value="20">20</option>
          <option value="50" selected>50</option>
          <option value="100">100</option>
          <option value="200">200</option>
        </select>
      </div>
      <div class="control-group">
        <button class="case-toggle" id="caseToggle">A/a</button>
      </div>
    </div>

    <div class="emoji-grid" id="emojiGrid"></div>

    <div class="pagination" id="pagination"></div>
  </div>

    // State
    let currentPage = 1;
    let pageSize = 50;
    let isUpperCase = false;
    let filteredEmojis = [];

    // Current category filter
    let currentCategory = 'all';
    let currentLang = 'zh';

    // Initialize application
    function init() {
      const savedCase = localStorage.getItem('twemoji-case');
      const savedPageSize = localStorage.getItem('twemoji-page-size');
      const savedCategory = localStorage.getItem('twemoji-category');
      const savedLang = localStorage.getItem('twemoji-lang');
      if (savedLang) {
        currentLang = savedLang;
      } else {
        // Auto-detect from browser language
        const browserLang = navigator.language || navigator.userLanguage;
        currentLang = browserLang.startsWith('zh') ? 'zh' : 'en';
      }

      if (savedCase === 'upper') {
        isUpperCase = true;
        document.getElementById('caseToggle').classList.add('active');
      }

      if (savedPageSize) {
        pageSize = parseInt(savedPageSize);
        document.getElementById('pageSizeSelect').value = pageSize;
      }

      if (savedCategory && CATEGORIES[savedCategory]) {
        currentCategory = savedCategory;
        document.getElementById('categorySelect').value = currentCategory;
      }

      filterEmojis();
    }

    // Get emoji image URL
    function getEmojiUrl(codepoint) {
      return TWEMOJI_CDN + codepoint + '.svg';
    }

    // Format shortcode based on case setting
    function formatShortcode(codepoint) {
      return isUpperCase ? codepoint.toUpperCase() : codepoint.toLowerCase();
    }

    // Render emoji grid for current page
    function renderGrid() {
      const grid = document.getElementById('emojiGrid');
      grid.innerHTML = '';

      const start = (currentPage - 1) * pageSize;
      const end = start + pageSize;
      const pageEmojis = filteredEmojis.slice(start, end);

      if (pageEmojis.length === 0) {
        grid.innerHTML = '<div class="empty-state">未找到匹配的emoji</div>';
        return;
      }

      pageEmojis.forEach(function(codepoint) {
        const card = document.createElement('div');
        card.className = 'emoji-card';
        card.dataset.codepoint = codepoint;

        const img = document.createElement('img');
        img.className = 'emoji-icon';
        img.src = getEmojiUrl(codepoint);
        img.alt = codepoint;
        img.loading = 'lazy';

        const label = document.createElement('div');
        label.className = 'emoji-label';
        label.textContent = formatShortcode(codepoint);

        card.appendChild(img);
        card.appendChild(label);
        card.addEventListener('click', function() {
          copyToClipboard(codepoint, card);
        });

        grid.appendChild(card);
      });
    }

    // Copy shortcode to clipboard
    async function copyToClipboard(codepoint, card) {
      const shortcode = formatShortcode(codepoint);

      try {
        await navigator.clipboard.writeText(shortcode);
      } catch (err) {
        const textArea = document.createElement('textarea');
        textArea.value = shortcode;
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand('copy');
        document.body.removeChild(textArea);
      }

      card.classList.add('copied');
      setTimeout(function() {
        card.classList.remove('copied');
      }, 300);
    }

    // Translation helper function
    function t(key) {
      return translations[currentLang][key] || translations['zh'][key] || key;
    }

    // Render pagination controls
    function renderPagination() {
      var pagination = document.getElementById('pagination');
      pagination.innerHTML = '';

      var totalPages = Math.ceil(filteredEmojis.length / pageSize);
      if (totalPages <= 1) return;

      // Previous button
      var prevBtn = createPageButton('Prev', currentPage - 1);
      if (currentPage === 1) prevBtn.classList.add('disabled');
      pagination.appendChild(prevBtn);

      // Page number buttons with ellipsis
      var startPage = Math.max(1, currentPage - 2);
      var endPage = Math.min(totalPages, currentPage + 2);

      if (startPage > 1) {
        pagination.appendChild(createPageButton('1', 1));
        if (startPage > 2) {
          var ellipsis = document.createElement('span');
          ellipsis.textContent = '...';
          ellipsis.style.padding = '8px 4px';
          ellipsis.style.color = '#888';
          pagination.appendChild(ellipsis);
        }
      }

      for (var i = startPage; i <= endPage; i++) {
        var btn = createPageButton(String(i), i);
        if (i === currentPage) btn.classList.add('active');
        pagination.appendChild(btn);
      }

      if (endPage < totalPages) {
        if (endPage < totalPages - 1) {
          var ellipsis2 = document.createElement('span');
          ellipsis2.textContent = '...';
          ellipsis2.style.padding = '8px 4px';
          ellipsis2.style.color = '#888';
          pagination.appendChild(ellipsis2);
        }
        pagination.appendChild(createPageButton(String(totalPages), totalPages));
      }

      // Next button
      var nextBtn = createPageButton('Next', currentPage + 1);
      if (currentPage === totalPages) nextBtn.classList.add('disabled');
      pagination.appendChild(nextBtn);
    }

    // Helper to create page buttons
    function createPageButton(text, page) {
      var btn = document.createElement('button');
      btn.className = 'page-btn';
      btn.textContent = text;
      btn.addEventListener('click', function() {
        if (page < 1) return;
        var totalPages = Math.ceil(filteredEmojis.length / pageSize);
        if (page > totalPages) return;
        currentPage = page;
        renderGrid();
        renderPagination();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
      return btn;
    }

    // Filter emojis by category and search query
    function filterEmojis() {
      let result = EMOJI_LIST;

      // Filter by category
      if (currentCategory !== 'all') {
        result = result.filter(function(cp) {
          return getEmojiCategory(cp) === currentCategory;
        });
      }

      // Filter by search query
      const query = document.querySelector('.search-input').value.trim();
      if (query) {
        const q = query.toLowerCase();
        result = result.filter(function(cp) {
          if (cp.toLowerCase().indexOf(q) !== -1) return true;
          const names = EMOJI_NAMES[cp];
          if (names) {
            if (names.en && names.en.toLowerCase().indexOf(q) !== -1) return true;
            if (names.zh && names.zh.toLowerCase().indexOf(q) !== -1) return true;
          }
          return false;
        });
      }

      filteredEmojis = result;
      currentPage = 1;
      renderGrid();
      renderPagination();
    }

    // Event listeners
    document.getElementById('searchBtn').addEventListener('click', function() {
      filterEmojis();
    });

    document.querySelector('.search-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        filterEmojis();
      }
    });

    document.getElementById('pageSizeSelect').addEventListener('change', function() {
      pageSize = parseInt(this.value);
      localStorage.setItem('twemoji-page-size', pageSize);
      currentPage = 1;
      renderGrid();
      renderPagination();
    });

    document.getElementById('caseToggle').addEventListener('click', function() {
      isUpperCase = !isUpperCase;
      this.classList.toggle('active');
      localStorage.setItem('twemoji-case', isUpperCase ? 'upper' : 'lower');
      renderGrid();
    });

    // Category filter
    document.getElementById('categorySelect').addEventListener('change', function() {
      currentCategory = this.value;
      localStorage.setItem('twemoji-category', currentCategory);
      filterEmojis();
    });

    // Initialize when DOM is ready
    document.addEventListener('DOMContentLoaded', init);
